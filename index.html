<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-State Cellular Automaton</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0e10;
    color: #ccc;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px 16px;
  }

  h1 {
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 20px;
  }

  canvas {
    border-radius: 6px;
    display: block;
    max-width: 100%;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-top: 18px;
    width: 100%;
    max-width: 800px;
  }

  label {
    font-size: 12px;
    color: #666;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  select, input[type=range] {
    background: #1a1a1e;
    color: #aaa;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
  }

  input[type=range] {
    padding: 0;
    width: 80px;
    accent-color: #888;
  }

  button {
    background: #1a1a1e;
    color: #aaa;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 5px 14px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }

  button:hover { background: #252528; }

  .stat {
    font-size: 11px;
    color: #444;
    margin-left: auto;
  }
</style>
</head>
<body>

<h1>Multi-State Cellular Automaton</h1>
<canvas id="ca"></canvas>

<div class="controls">
  <button id="btnPlay">Pause</button>
  <button id="btnReset">Reset</button>
  <label>States
    <select id="numStates">
      <option value="6">6</option>
      <option value="8" selected>8</option>
      <option value="12">12</option>
      <option value="16">16</option>
    </select>
  </label>
  <label>Rule
    <select id="ruleType">
      <option value="cyclic">Cyclic</option>
      <option value="majority">Majority</option>
      <option value="rps">Rock-Paper+</option>
    </select>
  </label>
  <label>Speed
    <input type="range" id="speed" min="1" max="30" value="12">
  </label>
  <span class="stat" id="genCount">Gen: 0</span>
</div>

<script>
const canvas = document.getElementById('ca');
const ctx = canvas.getContext('2d');

// Grid dimensions & cell size
const W = 200, H = 120, CELL = 4;
canvas.width  = W * CELL;
canvas.height = H * CELL;

let grid, next, N, rule;
let running = true, gen = 0, lastTime = 0;

// Color palettes indexed by number of states
const PALETTES = {
  6:  ['#e63946','#f4a261','#e9c46a','#2a9d8f','#264653','#8338ec'],
  8:  ['#ff6b6b','#ffa07a','#ffd700','#7fff00','#00ced1','#1e90ff','#9370db','#ff69b4'],
  12: ['#ff0000','#ff7f00','#ffff00','#00e676','#00bcd4','#2979ff',
       '#d500f9','#f50057','#ff6d00','#76ff03','#00e5ff','#651fff'],
  16: ['#e63946','#f4a261','#e9c46a','#2a9d8f','#264653','#8338ec',
       '#fb5607','#3a0ca3','#4361ee','#4cc9f0','#f72585','#7209b7',
       '#560bad','#b5179e','#3f37c9','#4895ef']
};

function hexToRgb(h) {
  return [
    parseInt(h.slice(1,3), 16),
    parseInt(h.slice(3,5), 16),
    parseInt(h.slice(5,7), 16)
  ];
}

// Wrap-around index
function idx(x, y) {
  return ((y + H) % H) * W + ((x + W) % W);
}

// ---------- RULES ----------

// Cyclic: a cell advances to next state if any neighbour IS the next state
function stepCyclic() {
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const s    = grid[idx(x, y)];
      const succ = (s + 1) % N;
      let found  = false;
      outer:
      for (let dy = -1; dy <= 1; dy++)
        for (let dx = -1; dx <= 1; dx++)
          if (grid[idx(x+dx, y+dy)] === succ) { found = true; break outer; }
      next[idx(x, y)] = found ? succ : s;
    }
  }
}

// Majority: cell takes the most common state among its 3×3 neighbourhood
function stepMajority() {
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const counts = new Array(N).fill(0);
      for (let dy = -1; dy <= 1; dy++)
        for (let dx = -1; dx <= 1; dx++)
          counts[grid[idx(x+dx, y+dy)]]++;
      let best = grid[idx(x, y)], bestC = counts[best];
      for (let s = 0; s < N; s++)
        if (counts[s] > bestC) { best = s; bestC = counts[s]; }
      next[idx(x, y)] = best;
    }
  }
}

// Rock-Paper+: need ≥3 neighbours of successor state to flip
function stepRPS() {
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const s    = grid[idx(x, y)];
      const succ = (s + 1) % N;
      let cnt    = 0;
      for (let dy = -1; dy <= 1; dy++)
        for (let dx = -1; dx <= 1; dx++)
          if (grid[idx(x+dx, y+dy)] === succ) cnt++;
      next[idx(x, y)] = cnt >= 3 ? succ : s;
    }
  }
}

// ---------- INIT / RENDER ----------

function init() {
  N    = parseInt(document.getElementById('numStates').value);
  rule = document.getElementById('ruleType').value;
  gen  = 0;
  document.getElementById('genCount').textContent = 'Gen: 0';
  grid = new Uint8Array(W * H);
  next = new Uint8Array(W * H);
  for (let i = 0; i < W * H; i++)
    grid[i] = Math.floor(Math.random() * N);
}

function step() {
  if      (rule === 'cyclic')   stepCyclic();
  else if (rule === 'majority') stepMajority();
  else                          stepRPS();
  [grid, next] = [next, grid];   // swap buffers
  gen++;
}

function render() {
  const palette  = PALETTES[N] || PALETTES[8];
  const imgData  = ctx.createImageData(canvas.width, canvas.height);
  const d        = imgData.data;

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const [r, g, b] = hexToRgb(palette[grid[y * W + x] % palette.length]);
      for (let py = 0; py < CELL; py++) {
        for (let px = 0; px < CELL; px++) {
          const i = ((y * CELL + py) * canvas.width + (x * CELL + px)) * 4;
          d[i] = r; d[i+1] = g; d[i+2] = b; d[i+3] = 255;
        }
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

// ---------- LOOP ----------

const speedEl = document.getElementById('speed');

function loop(ts) {
  requestAnimationFrame(loop);
  if (!running) return;
  const interval = 1000 / parseInt(speedEl.value);
  if (ts - lastTime < interval) return;
  lastTime = ts;
  step();
  render();
  document.getElementById('genCount').textContent = 'Gen: ' + gen;
}

// ---------- CONTROLS ----------

document.getElementById('btnPlay').onclick = function() {
  running = !running;
  this.textContent = running ? 'Pause' : 'Play';
};
document.getElementById('btnReset').onclick  = () => { init(); render(); };
document.getElementById('numStates').onchange = () => { init(); render(); };
document.getElementById('ruleType').onchange  = () => { init(); render(); };

// ---------- START ----------

init();
render();
requestAnimationFrame(loop);
</script>
</body>
</html>
